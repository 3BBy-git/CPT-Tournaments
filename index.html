<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MYRoutine</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #0f172a;
            color: white;
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stats {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            min-width: 250px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .task {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
        }

        .task-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #0f172a;
            border-radius: 999px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg,#3b82f6,#22c55e);
        }

        .completed {
            color: #22c55e;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="topbar">

        <h1>MYRoutine 🚀</h1>

        <div class="stats">

            <p id="completedCounter">
                Completate: 0 / 0
            </p>

            <p id="averageProgress">
                Media completamento: 0%
            </p>

        </div>

    </div>

    <div class="add-task">

        <input type="text"
               id="taskInput"
               placeholder="Nuova task...">

        <button onclick="addTask()">
            Aggiungi
        </button>

    </div>

    <div id="taskList"></div>

    <script>

        const TOKEN = "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";

        const USERNAME = "3BBy-git";

        const REPO = "CPT-Tournaments";

        const FILE_PATH = "data.json";

        async function loadData() {

            const response = await fetch(
                `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`
            );

            return await response.json();
        }

        async function saveData(newData) {

            const fileResponse = await fetch(
                `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FILE_PATH}`,
                {
                    headers: {
                        Authorization: `token ${TOKEN}`
                    }
                }
            );

            const fileData = await fileResponse.json();

            const sha = fileData.sha;

            const content = btoa(
                unescape(
                    encodeURIComponent(
                        JSON.stringify(newData, null, 2)
                    )
                )
            );

            await fetch(
                `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FILE_PATH}`,
                {

                    method: "PUT",

                    headers: {
                        Authorization: `token ${TOKEN}`,
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        message: "update tasks",

                        content: content,

                        sha: sha

                    })

                }
            );

        }

        async function renderTasks() {

            const data = await loadData();

            const container =
                document.getElementById("taskList");

            container.innerHTML = "";

            let completed = 0;

            let totalProgress = 0;

            data.tasks.forEach((task, index) => {

                totalProgress += task.progress;

                if (task.progress === 100) {
                    completed++;
                }

                container.innerHTML += `

                <div class="task">

                    <div class="task-top">

                        <div>

                            <h2>${task.title}</h2>

                            ${task.progress === 100
                        ?
                        `<div class="completed">
                                    ✔ Completata
                                </div>`
                        :
                        ``
                    }

                        </div>

                        <select
                            onchange="updateProgress(${index}, this.value)"
                        >

                            ${generateOptions(task.progress)}

                        </select>

                    </div>

                    <div class="progress-bar">

                        <div
                            class="progress"
                            style="width:${task.progress}%"
                        ></div>

                    </div>

                    <p>${task.progress}%</p>

                </div>

            `;
            });

            document.getElementById(
                "completedCounter"
            ).innerText =
                `Completate: ${completed} / ${data.tasks.length}`;

            const avg =
                data.tasks.length > 0
                    ?
                    totalProgress / data.tasks.length
                    :
                    0;

            document.getElementById(
                "averageProgress"
            ).innerText =
                `Media completamento: ${avg.toFixed(1)}%`;

        }

        function generateOptions(selected) {

            let html = "";

            for (let i = 0; i <= 100; i += 10) {

                html += `
                <option
                    value="${i}"
                    ${selected == i ? "selected" : ""}
                >
                    ${i}%
                </option>
            `;
            }

            return html;
        }

        async function addTask() {

            const input =
                document.getElementById("taskInput");

            if (input.value.trim() === "") return;

            const data = await loadData();

            data.tasks.push({

                title: input.value,
                progress: 0

            });

            await saveData(data);

            input.value = "";

            renderTasks();
        }

        async function updateProgress(index, value) {

            const data = await loadData();

            data.tasks[index].progress =
                parseInt(value);

            await saveData(data);

            renderTasks();
        }

        renderTasks();

    </script>

</body>
</html>
