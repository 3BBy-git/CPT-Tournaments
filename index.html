<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MYRoutine Checklist</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        padding:30px;
    }

    .container{
        max-width:1200px;
        margin:auto;
    }

    .topbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
    }

    h1{
        font-size:42px;
    }

    .stats{
        background:#1e293b;
        padding:15px 20px;
        border-radius:15px;
        text-align:right;
        min-width:260px;
    }

    .stats p{
        margin:5px 0;
    }

    .section{
        background:#1e293b;
        padding:25px;
        border-radius:20px;
        margin-bottom:25px;
    }

    .section h2{
        margin-bottom:20px;
    }

    input, textarea, button{
        border:none;
        outline:none;
        border-radius:10px;
    }

    input, textarea{
        width:100%;
        padding:12px;
        margin-bottom:12px;
        background:#334155;
        color:white;
    }

    button{
        padding:12px 18px;
        background:#3b82f6;
        color:white;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.03);
    }

    .task{
        background:#334155;
        padding:15px;
        border-radius:15px;
        margin-top:15px;
    }

    .task-top{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
    }

    .task-title{
        font-size:20px;
        font-weight:bold;
    }

    .completed{
        color:#22c55e;
        font-weight:bold;
    }

    .progress-container{
        margin-top:15px;
    }

    .progress-bar{
        width:100%;
        height:20px;
        background:#0f172a;
        border-radius:999px;
        overflow:hidden;
        margin-top:8px;
    }

    .progress{
        height:100%;
        background:linear-gradient(90deg,#3b82f6,#22c55e);
        width:0%;
        transition:0.3s;
    }

    .request{
        background:#334155;
        padding:15px;
        border-radius:15px;
        margin-top:15px;
    }

    .response{
        margin-top:10px;
        background:#475569;
        padding:10px;
        border-radius:10px;
    }

    .done{
        color:#22c55e;
        font-weight:bold;
        margin-top:10px;
    }

    .save-box{
        margin-top:25px;
        text-align:center;
    }

    .json-area{
        margin-top:15px;
        height:250px;
    }

    .small{
        font-size:14px;
        opacity:0.7;
    }
</style>
</head>
<body>

<div class="container">

    <div class="topbar">
        <h1>MYRoutine 🚀</h1>

        <div class="stats">
            <p id="completedCounter">Completate: 0 / 0</p>
            <p id="averageProgress">Media completamento: 0%</p>
        </div>
    </div>

    <div class="section">
        <h2>Aggiungi Task</h2>

        <input type="text" id="taskInput" placeholder="Nome task...">
        <button onclick="addTask()">Aggiungi Task</button>

        <div id="taskList"></div>
    </div>

    <div class="section">
        <h2>Richieste Team</h2>

        <textarea id="requestInput" placeholder="Scrivi una richiesta..."></textarea>
        <button onclick="addRequest()">Pubblica richiesta</button>

        <div id="requestList"></div>
    </div>

    <div class="section save-box">
        <h2>JSON Database</h2>
        <p class="small">
            Qui sotto hai il JSON completo del progetto.  
            Puoi copiarlo oppure salvarlo in un file .json 🔥
        </p>

        <textarea class="json-area" id="jsonOutput"></textarea>
    </div>

</div>

<script>

let database = {
    tasks: [],
    requests: []
};

function updateStats(){

    const total = database.tasks.length;

    const completed = database.tasks.filter(t => t.progress === 100).length;

    let avg = 0;

    if(total > 0){
        avg = database.tasks.reduce((sum,t)=>sum+t.progress,0) / total;
    }

    document.getElementById("completedCounter").innerText =
        `Completate: ${completed} / ${total}`;

    document.getElementById("averageProgress").innerText =
        `Media completamento: ${avg.toFixed(1)}%`;

    updateJSON();
}

function updateJSON(){
    document.getElementById("jsonOutput").value =
        JSON.stringify(database,null,2);
}

function addTask(){

    const input = document.getElementById("taskInput");

    if(input.value.trim() === "") return;

    const task = {
        id: Date.now(),
        title: input.value,
        progress: 0
    };

    database.tasks.push(task);

    renderTasks();

    input.value = "";
}

function renderTasks(){

    const container = document.getElementById("taskList");

    container.innerHTML = "";

    database.tasks.forEach(task => {

        const div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
            <div class="task-top">
                <div>
                    <div class="task-title">${task.title}</div>
                    ${
                        task.progress === 100
                        ? `<div class="completed">✔ Completato</div>`
                        : ``
                    }
                </div>

                <div>
                    <select onchange="updateProgress(${task.id}, this.value)">
                        ${generateOptions(task.progress)}
                    </select>
                </div>
            </div>

            <div class="progress-container">
                <p>${task.progress}%</p>

                <div class="progress-bar">
                    <div class="progress" style="width:${task.progress}%"></div>
                </div>
            </div>
        `;

        container.appendChild(div);
    });

    updateStats();
}

function generateOptions(selected){

    let options = "";

    for(let i=0; i<=100; i+=10){

        options += `
            <option value="${i}"
                ${selected == i ? "selected" : ""}>
                ${i}%
            </option>
        `;
    }

    return options;
}

function updateProgress(id, value){

    const task = database.tasks.find(t => t.id === id);

    if(task){
        task.progress = parseInt(value);
    }

    renderTasks();
}

function addRequest(){

    const input = document.getElementById("requestInput");

    if(input.value.trim() === "") return;

    const request = {
        id: Date.now(),
        text: input.value,
        responses: [],
        completed: false
    };

    database.requests.push(request);

    renderRequests();

    input.value = "";
}

function renderRequests(){

    const container = document.getElementById("requestList");

    container.innerHTML = "";

    database.requests.forEach(req => {

        const div = document.createElement("div");
        div.className = "request";

        div.innerHTML = `
            <h3>${req.text}</h3>

            ${
                req.completed
                ? `<div class="done">✔ Richiesta completata</div>`
                : ``
            }

            <div id="responses-${req.id}">
                ${req.responses.map(r =>
                    `<div class="response">${r}</div>`
                ).join("")}
            </div>

            <textarea id="responseInput-${req.id}"
                placeholder="Rispondi..."></textarea>

            <button onclick="addResponse(${req.id})">
                Invia risposta
            </button>

            <button onclick="toggleRequest(${req.id})">
                ${
                    req.completed
                    ? "Segna non completata"
                    : "Segna completata"
                }
            </button>
        `;

        container.appendChild(div);
    });

    updateJSON();
}

function addResponse(id){

    const input = document.getElementById(`responseInput-${id}`);

    if(input.value.trim() === "") return;

    const request = database.requests.find(r => r.id === id);

    if(request){
        request.responses.push(input.value);
    }

    renderRequests();
}

function toggleRequest(id){

    const request = database.requests.find(r => r.id === id);

    if(request){
        request.completed = !request.completed;
    }

    renderRequests();
}

renderTasks();
renderRequests();

</script>

</body>
</html>
